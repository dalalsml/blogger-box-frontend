<section class="posts-list">
  <div class="toolbar">
    <h2>Blog Posts</h2>
    <button type="button" class="btn btn-primary" (click)="loadPosts()">Recharger</button>
  </div>

  @if (posts$ | async; as posts) {
    @if (loading) {
      <p>Chargement...</p>
    } @else if (error) {
      <p class="error">{{ error }}</p>
    } @else {
      @if (posts.length) {
        <div class="list">
          @for (post of posts; track post.id) {
            <app-post-list-item [post]="post"></app-post-list-item>
          }
        </div>
      } @else {
        <p class="empty">Aucun post disponible.</p>
      }
    }
  }
</section>
